<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CornWatch</title>
<style>
  :root {
    --bg:       #0a0a0a;
    --bg2:      #111111;
    --bg3:      #1a1a1a;
    --border:   rgba(255,255,255,0.07);
    --green:    #6fcf6f;
    --green2:   #4aaa4a;
    --amber:    #f2b04a;
    --red:      #e05454;
    --text:     #e0e0d8;
    --muted:    #666660;
    --radius:   10px;
    --font:     'Courier New', 'Consolas', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

  /* ── Layout ──────────────────────────────────────────────────── */
  #root { display: grid; grid-template-rows: 48px 1fr; height: 100vh; }

  /* ── Header ─────────────────────────────────────────────────── */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 0 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .logo { font-size: 20px; }
  .app-title { font-size: 13px; letter-spacing: 0.12em; color: var(--green); text-transform: uppercase; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; font-size: 11px; color: var(--muted); }
  #health-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 20px;
    background: var(--bg3); border: 1px solid var(--border);
    font-size: 12px; font-weight: bold; letter-spacing: .05em;
    transition: color .4s, border-color .4s;
  }
  #health-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Dashboard grid ──────────────────────────────────────────── */
  #dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 260px;
    grid-template-rows: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }

  /* ── Card base ───────────────────────────────────────────────── */
  .card {
    background: var(--bg);
    padding: 16px 18px;
    display: flex; flex-direction: column; gap: 10px;
    overflow: hidden; position: relative;
  }
  .card-label {
    font-size: 10px; letter-spacing: .14em; color: var(--muted); text-transform: uppercase;
  }
  .card-value {
    font-size: 28px; font-weight: bold; line-height: 1; color: var(--text);
    transition: color .4s;
  }
  .card-sub { font-size: 11px; color: var(--muted); }

  /* ── Gauge ring ──────────────────────────────────────────────── */
  .gauge-wrap { position: relative; width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; }
  .gauge-svg { width: 100%; max-width: 130px; }
  .gauge-center { position: absolute; text-align: center; pointer-events: none; }
  .gauge-pct { font-size: 20px; font-weight: bold; }
  .gauge-unit { font-size: 10px; color: var(--muted); }
  .ring-bg  { fill: none; stroke: var(--bg3); }
  .ring-fg  { fill: none; stroke-linecap: round; transition: stroke-dashoffset .6s ease, stroke .4s; }

  /* ── CPU heatmap ─────────────────────────────────────────────── */
  #cpu-heatmap {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
    gap: 4px; flex: 1; align-content: start;
  }
  .core-cell {
    aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: rgba(255,255,255,.5);
    transition: background .4s;
  }

  /* ── Network ─────────────────────────────────────────────────── */
  #net-canvas { width: 100%; flex: 1; }

  /* ── Disk bars ───────────────────────────────────────────────── */
  .disk-row { display: flex; flex-direction: column; gap: 3px; }
  .disk-header { display: flex; justify-content: space-between; font-size: 11px; }
  .disk-bar-wrap { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .disk-bar { height: 100%; border-radius: 3px; transition: width .6s ease, background .4s; }

  /* ── Alerts panel (right column, spans both rows) ────────────── */
  #alerts-card { grid-column: 4; grid-row: 1 / 3; }
  .alert-list { display: flex; flex-direction: column; gap: 6px; flex: 1; overflow-y: auto; }
  .alert-item {
    padding: 8px 10px; border-radius: 6px;
    border-left: 3px solid var(--green);
    background: var(--bg3);
    font-size: 11px; line-height: 1.5;
  }
  .alert-item.warning { border-color: var(--amber); }
  .alert-item.critical { border-color: var(--red); background: rgba(224,84,84,.08); }
  .alert-cat { font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
  .no-alerts { font-size: 12px; color: var(--green); opacity: .6; text-align: center; margin-top: 20px; }

  /* ── Mini sparkline ──────────────────────────────────────────── */
  .sparkline { width: 100%; height: 28px; }
  .spark-path { fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

  /* ── Process watchdog (bottom strip) ─────────────────────────── */
  #proc-card { grid-column: 1 / 4; }
  .proc-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .proc-table th { color: var(--muted); text-align: left; padding: 0 8px 4px 0; font-weight: normal; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; }
  .proc-table td { padding: 3px 8px 3px 0; border-top: 1px solid var(--border); }
  .proc-bar { display: inline-block; height: 4px; border-radius: 2px; background: var(--green); vertical-align: middle; transition: width .4s; }
</style>
</head>
<body>
<div id="root">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header>
    <span class="logo">🌽</span>
    <span class="app-title">CornWatch</span>
    <span style="font-size:11px;color:var(--muted)" id="cpu-name">—</span>
    <div class="header-right">
      <span id="timestamp">—</span>
      <div id="health-badge">
        <span class="dot"></span>
        <span id="health-val">—</span>
      </div>
    </div>
  </header>

  <!-- ── Dashboard ──────────────────────────────────────────── -->
  <div id="dashboard">

    <!-- CPU gauge -->
    <div class="card" id="cpu-card">
      <span class="card-label">CPU Usage</span>
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="38" stroke-width="7"/>
          <circle id="cpu-ring" class="ring-fg" cx="50" cy="50" r="38" stroke-width="7"
            stroke="#6fcf6f"
            stroke-dasharray="238.76"
            stroke-dashoffset="238.76"
            transform="rotate(-90 50 50)"/>
        </svg>
        <div class="gauge-center">
          <div class="gauge-pct" id="cpu-pct">0%</div>
          <div class="gauge-unit">total</div>
        </div>
      </div>
      <svg class="sparkline" id="cpu-spark" viewBox="0 0 200 28" preserveAspectRatio="none"></svg>
      <div class="card-sub" id="cpu-temp">Temp: —</div>
    </div>

    <!-- RAM gauge -->
    <div class="card" id="ram-card">
      <span class="card-label">Memory</span>
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="38" stroke-width="7"/>
          <circle id="ram-ring" class="ring-fg" cx="50" cy="50" r="38" stroke-width="7"
            stroke="#6fcf6f"
            stroke-dasharray="238.76"
            stroke-dashoffset="238.76"
            transform="rotate(-90 50 50)"/>
        </svg>
        <div class="gauge-center">
          <div class="gauge-pct" id="ram-pct">0%</div>
          <div class="gauge-unit">used</div>
        </div>
      </div>
      <svg class="sparkline" id="ram-spark" viewBox="0 0 200 28" preserveAspectRatio="none"></svg>
      <div class="card-sub" id="ram-gb">— / — GB</div>
    </div>

    <!-- Network -->
    <div class="card" id="net-card">
      <span class="card-label">Network</span>
      <div style="display:flex;gap:16px;font-size:11px;color:var(--muted)">
        <span>▲ <span id="net-up">0</span> Mbps</span>
        <span>▼ <span id="net-down">0</span> Mbps</span>
      </div>
      <canvas id="net-canvas" height="80"></canvas>
      <div class="card-sub" id="net-adapter">—</div>
    </div>

    <!-- Alerts (spans both rows, col 4) -->
    <div class="card" id="alerts-card">
      <span class="card-label">Health Alerts</span>
      <div class="alert-list" id="alert-list">
        <div class="no-alerts">All systems nominal</div>
      </div>
      <div style="margin-top:auto;display:flex;gap:8px">
        <button onclick="bridge('taskmgr')" style="flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:6px;border-radius:6px;cursor:pointer;font-size:10px;font-family:inherit">Task Manager</button>
        <button onclick="bridge('resmon')"  style="flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:6px;border-radius:6px;cursor:pointer;font-size:10px;font-family:inherit">Res Monitor</button>
      </div>
    </div>

    <!-- CPU core heatmap + Process table -->
    <div class="card" id="proc-card" style="gap:8px">
      <div style="display:flex;gap:24px;flex:1;overflow:hidden">

        <!-- Core heatmap -->
        <div style="min-width:120px">
          <span class="card-label">CPU Cores</span>
          <div id="cpu-heatmap" style="margin-top:8px"></div>
        </div>

        <!-- Process watchdog -->
        <div style="flex:1;overflow:hidden">
          <span class="card-label">Top Processes</span>
          <div style="overflow-y:auto;max-height:calc(100% - 20px);margin-top:8px">
            <table class="proc-table">
              <thead><tr>
                <th>Process</th>
                <th>CPU%</th>
                <th>RAM MB</th>
                <th>Bar</th>
              </tr></thead>
              <tbody id="proc-tbody"></tbody>
            </table>
          </div>
        </div>

        <!-- Disk -->
        <div style="min-width:160px">
          <span class="card-label">Disk I/O & Space</span>
          <div style="font-size:11px;color:var(--muted);margin-top:6px">
            R: <span id="disk-read">0</span> MB/s &nbsp; W: <span id="disk-write">0</span> MB/s
          </div>
          <div id="disk-bars" style="display:flex;flex-direction:column;gap:8px;margin-top:10px"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ── Sparkline history ──────────────────────────────────────────────
const HIST = 60;
const cpuHist = Array(HIST).fill(0);
const ramHist = Array(HIST).fill(0);

// Net chart
const netCanvas = document.getElementById('net-canvas');
const netCtx    = netCanvas.getContext('2d');
const netUp     = Array(80).fill(0);
const netDown   = Array(80).fill(0);

// ── Colour helpers ─────────────────────────────────────────────────
function pctColor(v) {
  if (v > 85) return '#e05454';
  if (v > 65) return '#f2b04a';
  return '#6fcf6f';
}

function coreColor(v) {
  const r = v > 80 ? 224 : v > 50 ? 200 + (v-50)*0.48 : 60;
  const g = v > 80 ? 84  : v > 50 ? 150 - (v-50)*1.3  : 207;
  const b = 80;
  return `rgb(${Math.round(r)},${Math.round(g)},${b})`;
}

// ── Ring gauge ─────────────────────────────────────────────────────
function setRing(id, pct) {
  const circ = 238.76;
  const el = document.getElementById(id);
  el.style.strokeDashoffset = circ - (pct / 100) * circ;
  el.style.stroke = pctColor(pct);
}

// ── Sparkline ──────────────────────────────────────────────────────
function renderSparkline(svgId, data, color) {
  const svg = document.getElementById(svgId);
  const W = 200, H = 28, max = Math.max(...data, 1);
  const pts = data.map((v, i) => `${(i/(data.length-1)*W).toFixed(1)},${(H - (v/max)*H).toFixed(1)}`).join(' ');
  svg.innerHTML = `<polyline class="spark-path" points="${pts}" stroke="${color}" opacity=".6"/>`;
}

// ── Net chart ──────────────────────────────────────────────────────
function drawNetChart() {
  const W = netCanvas.offsetWidth || 300;
  const H = netCanvas.offsetHeight || 80;
  netCanvas.width = W; netCanvas.height = H;
  const ctx = netCtx;
  ctx.clearRect(0, 0, W, H);

  const maxVal = Math.max(...netUp, ...netDown, 0.1);
  const n = netUp.length;

  function drawLine(data, color, fill) {
    ctx.beginPath();
    data.forEach((v, i) => {
      const x = (i / (n-1)) * W;
      const y = H - (v / maxVal) * H * 0.9 - 4;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  drawLine(netDown, '#6fcf6f');
  drawLine(netUp,   '#f2b04a');
}

// ── Snapshot handler ───────────────────────────────────────────────
window.cornWatch = {
  onSnapshot(snap) {
    // Header
    document.getElementById('cpu-name').textContent = snap.cpuName || '—';
    document.getElementById('timestamp').textContent =
      new Date(snap.timestamp).toLocaleTimeString();

    // Health badge
    const hv = document.getElementById('health-val');
    hv.textContent = `${snap.healthScore}/100`;
    hv.style.color = pctColor(100 - snap.healthScore);

    // CPU
    const cpuPct = Math.round(snap.cpuTotalUsage);
    document.getElementById('cpu-pct').textContent = cpuPct + '%';
    document.getElementById('cpu-pct').style.color = pctColor(cpuPct);
    setRing('cpu-ring', cpuPct);
    cpuHist.push(cpuPct); cpuHist.shift();
    renderSparkline('cpu-spark', cpuHist, pctColor(cpuPct));
    if (snap.cpuTemperature > 0)
      document.getElementById('cpu-temp').textContent = `Temp: ${snap.cpuTemperature.toFixed(0)}°C`;

    // RAM
    const ramPct = Math.round(snap.ramUsagePercent);
    document.getElementById('ram-pct').textContent = ramPct + '%';
    document.getElementById('ram-pct').style.color = pctColor(ramPct);
    setRing('ram-ring', ramPct);
    ramHist.push(ramPct); ramHist.shift();
    renderSparkline('ram-spark', ramHist, pctColor(ramPct));
    const usedGb = (snap.ramUsedBytes / 1073741824).toFixed(1);
    const totGb  = (snap.ramTotalBytes / 1073741824).toFixed(1);
    document.getElementById('ram-gb').textContent = `${usedGb} / ${totGb} GB`;

    // Net
    document.getElementById('net-up').textContent   = snap.networkSentMbps.toFixed(2);
    document.getElementById('net-down').textContent = snap.networkReceivedMbps.toFixed(2);
    document.getElementById('net-adapter').textContent = snap.activeAdapterName || '—';
    netUp.push(snap.networkSentMbps);     netUp.shift();
    netDown.push(snap.networkReceivedMbps); netDown.shift();
    drawNetChart();

    // Disk I/O
    document.getElementById('disk-read').textContent  = snap.diskReadMbps.toFixed(1);
    document.getElementById('disk-write').textContent = snap.diskWriteMbps.toFixed(1);

    // Disk bars
    const diskContainer = document.getElementById('disk-bars');
    diskContainer.innerHTML = '';
    (snap.disks || []).forEach(d => {
      const pct = Math.round(d.usagePercent);
      const freeGb = (d.freeBytes / 1073741824).toFixed(0);
      diskContainer.innerHTML += `
        <div class="disk-row">
          <div class="disk-header">
            <span>${d.driveLetter} ${d.label || ''}</span>
            <span style="color:${pctColor(pct)}">${pct}%</span>
          </div>
          <div class="disk-bar-wrap">
            <div class="disk-bar" style="width:${pct}%;background:${pctColor(pct)}"></div>
          </div>
          <div style="font-size:9px;color:#555">${freeGb} GB free</div>
        </div>`;
    });

    // CPU core heatmap
    const heatmap = document.getElementById('cpu-heatmap');
    const cores = snap.cpuCoreUsages || [];
    if (heatmap.children.length !== cores.length) {
      heatmap.innerHTML = cores.map((_,i) =>
        `<div class="core-cell" id="core-${i}">${i}</div>`).join('');
    }
    cores.forEach((v, i) => {
      const cell = document.getElementById(`core-${i}`);
      if (cell) cell.style.background = coreColor(v);
    });

    // Alerts
    const list = document.getElementById('alert-list');
    const alerts = snap.alerts || [];
    if (alerts.length === 0) {
      list.innerHTML = '<div class="no-alerts">All systems nominal ✓</div>';
    } else {
      list.innerHTML = alerts.map(a => `
        <div class="alert-item ${a.severity.toLowerCase()}">
          <div class="alert-cat">${a.category}</div>
          ${a.message}
        </div>`).join('');
    }
  }
};

// ── Bridge helpers ─────────────────────────────────────────────────
function bridge(action) {
  try {
    if (action === 'taskmgr') window.chrome.webview.hostObjects.cornBridge.OpenProcessManager();
    if (action === 'resmon')  window.chrome.webview.hostObjects.cornBridge.OpenResourceMonitor();
  } catch (e) { console.warn('bridge unavailable', e); }
}

// ── Resize net canvas on window resize ────────────────────────────
window.addEventListener('resize', drawNetChart);
drawNetChart();
</script>
</body>
</html>
