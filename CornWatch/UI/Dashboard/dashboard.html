<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CornWatch</title>
<style>
  :root {
    --bg:#0a0a0a; --bg2:#111111; --bg3:#1a1a1a;
    --border:rgba(255,255,255,0.07);
    --green:#6fcf6f; --amber:#f2b04a; --red:#e05454; --blue:#5ab4e8;
    --text:#e0e0d8; --muted:#666660;
    --radius:10px; --font:'Courier New','Consolas',monospace;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--font); overflow:hidden; }

  #root { display:grid; grid-template-rows:48px 1fr; height:100vh; }

  header {
    display:flex; align-items:center; gap:14px; padding:0 20px;
    background:var(--bg2); border-bottom:1px solid var(--border);
  }
  .logo { font-size:20px; }
  .app-title { font-size:13px; letter-spacing:.12em; color:var(--green); text-transform:uppercase; }
  .header-right { margin-left:auto; display:flex; align-items:center; gap:16px; font-size:11px; color:var(--muted); }
  #health-badge {
    display:flex; align-items:center; gap:6px; padding:4px 10px;
    border-radius:20px; background:var(--bg3); border:1px solid var(--border);
    font-size:12px; font-weight:bold; letter-spacing:.05em; transition:color .4s;
  }
  #health-badge .dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

  /* ── Dashboard grid: 4 columns, 2 rows ── */
  #dashboard {
    display:grid;
    grid-template-columns: 1fr 1fr 1fr 260px;
    grid-template-rows: 1fr 1fr;
    gap:1px; background:var(--border); overflow:hidden;
  }

  .card {
    background:var(--bg); padding:16px 18px;
    display:flex; flex-direction:column; gap:10px; overflow:hidden; position:relative;
  }
  .card-label { font-size:10px; letter-spacing:.14em; color:var(--muted); text-transform:uppercase; }
  .card-sub { font-size:11px; color:var(--muted); }

  /* ── Gauge ring ── */
  .gauge-wrap { position:relative; width:100%; flex:1; display:flex; align-items:center; justify-content:center; }
  .gauge-svg { width:100%; max-width:130px; }
  .gauge-center { position:absolute; text-align:center; pointer-events:none; }
  .gauge-pct { font-size:20px; font-weight:bold; }
  .gauge-unit { font-size:10px; color:var(--muted); }
  .ring-bg { fill:none; stroke:var(--bg3); }
  .ring-fg { fill:none; stroke-linecap:round; transition:stroke-dashoffset .6s ease, stroke .4s; }

  /* ── CPU heatmap ── */
  #cpu-heatmap { display:grid; grid-template-columns:repeat(auto-fill,minmax(32px,1fr)); gap:4px; flex:1; align-content:start; }
  .core-cell { aspect-ratio:1; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:9px; color:rgba(255,255,255,.5); transition:background .4s; }

  /* ── Network ── */
  #net-canvas { width:100%; flex:1; }

  /* ── Disk bars ── */
  .disk-row { display:flex; flex-direction:column; gap:3px; }
  .disk-header { display:flex; justify-content:space-between; font-size:11px; }
  .disk-bar-wrap { height:6px; background:var(--bg3); border-radius:3px; overflow:hidden; }
  .disk-bar { height:100%; border-radius:3px; transition:width .6s ease, background .4s; }

  /* ── GPU card ── */
  #gpu-card { }
  .gpu-stat-row { display:flex; justify-content:space-between; align-items:center; font-size:11px; }
  .gpu-stat-label { color:var(--muted); font-size:10px; letter-spacing:.06em; }
  .gpu-stat-val { font-weight:bold; transition:color .4s; }
  .gpu-bar-wrap { height:4px; background:var(--bg3); border-radius:2px; overflow:hidden; margin-top:2px; }
  .gpu-bar { height:100%; border-radius:2px; transition:width .6s ease, background .4s; }
  .gpu-name { font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .ctrl-btn {
    flex:1; background:var(--bg3); border:1px solid rgba(255,255,255,0.15);
    color:var(--text); padding:9px 8px; border-radius:8px; cursor:pointer;
    font-size:11px; font-family:inherit; letter-spacing:.05em;
    transition:background .2s;
  }
  .ctrl-btn:hover { background:#2a2a2a; }

  /* ── Alerts ── */
  #alerts-card { grid-column:4; grid-row:1/3; }
  .alert-list { display:flex; flex-direction:column; gap:6px; flex:1; overflow-y:auto; }
  .alert-item { padding:8px 10px; border-radius:6px; border-left:3px solid var(--green); background:var(--bg3); font-size:11px; line-height:1.5; }
  .alert-item.warning { border-color:var(--amber); }
  .alert-item.critical { border-color:var(--red); background:rgba(224,84,84,.08); }
  .alert-cat { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
  .no-alerts { font-size:12px; color:var(--green); opacity:.6; text-align:center; margin-top:20px; }

  /* ── Sparkline ── */
  .sparkline { width:100%; height:28px; }
  .spark-path { fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }

  /* ── Process / bottom row ── */
  #proc-card { grid-column:1/4; }
  .proc-table { width:100%; border-collapse:collapse; font-size:11px; }
  .proc-table th { color:var(--muted); text-align:left; padding:0 8px 4px 0; font-weight:normal; font-size:10px; letter-spacing:.1em; text-transform:uppercase; }
  .proc-table td { padding:3px 8px 3px 0; border-top:1px solid var(--border); }
  .proc-bar { display:inline-block; height:4px; border-radius:2px; background:var(--green); vertical-align:middle; transition:width .4s; }
</style>
</head>
<body>
<div id="root">

  <header>
    <span class="logo">🌽</span>
    <span class="app-title">CornWatch</span>
    <span style="font-size:11px;color:var(--muted)" id="cpu-name">—</span>
    <div class="header-right">
      <span id="timestamp">—</span>
      <div id="health-badge"><span class="dot"></span><span id="health-val">—</span></div>
    </div>
  </header>

  <div id="dashboard">

    <!-- CPU -->
    <div class="card">
      <span class="card-label">CPU Usage</span>
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="38" stroke-width="7"/>
          <circle id="cpu-ring" class="ring-fg" cx="50" cy="50" r="38" stroke-width="7"
            stroke="#6fcf6f" stroke-dasharray="238.76" stroke-dashoffset="238.76"
            transform="rotate(-90 50 50)"/>
        </svg>
        <div class="gauge-center">
          <div class="gauge-pct" id="cpu-pct">0%</div>
          <div class="gauge-unit">total</div>
        </div>
      </div>
      <svg class="sparkline" id="cpu-spark" viewBox="0 0 200 28" preserveAspectRatio="none"></svg>
      <div class="card-sub" id="cpu-temp">Temp: —</div>
    </div>

    <!-- RAM -->
    <div class="card">
      <span class="card-label">Memory</span>
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="38" stroke-width="7"/>
          <circle id="ram-ring" class="ring-fg" cx="50" cy="50" r="38" stroke-width="7"
            stroke="#6fcf6f" stroke-dasharray="238.76" stroke-dashoffset="238.76"
            transform="rotate(-90 50 50)"/>
        </svg>
        <div class="gauge-center">
          <div class="gauge-pct" id="ram-pct">0%</div>
          <div class="gauge-unit">used</div>
        </div>
      </div>
      <svg class="sparkline" id="ram-spark" viewBox="0 0 200 28" preserveAspectRatio="none"></svg>
      <div class="card-sub" id="ram-gb">— / — GB</div>
    </div>

    <!-- GPU -->
    <div class="card" id="gpu-card">
      <span class="card-label">GPU</span>
      <div class="gpu-name" id="gpu-name">Detecting...</div>

      <div class="gauge-wrap" style="flex:unset;height:80px">
        <svg class="gauge-svg" viewBox="0 0 100 100" style="max-width:80px">
          <circle class="ring-bg" cx="50" cy="50" r="38" stroke-width="7"/>
          <circle id="gpu-ring" class="ring-fg" cx="50" cy="50" r="38" stroke-width="7"
            stroke="#5ab4e8" stroke-dasharray="238.76" stroke-dashoffset="238.76"
            transform="rotate(-90 50 50)"/>
        </svg>
        <div class="gauge-center" style="position:relative;margin-left:8px;text-align:left">
          <div style="font-size:22px;font-weight:bold" id="gpu-pct">0%</div>
          <div style="font-size:10px;color:var(--muted)">GPU load</div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:6px;flex:1">

        <div class="gpu-stat-row">
          <span class="gpu-stat-label">TEMP</span>
          <span class="gpu-stat-val" id="gpu-temp">—</span>
        </div>

        <div>
          <div class="gpu-stat-row">
            <span class="gpu-stat-label">VRAM</span>
            <span class="gpu-stat-val" id="gpu-vram">—</span>
          </div>
          <div class="gpu-bar-wrap">
            <div class="gpu-bar" id="gpu-vram-bar" style="width:0%;background:var(--blue)"></div>
          </div>
        </div>

        <div class="gpu-stat-row">
          <span class="gpu-stat-label">FAN</span>
          <span class="gpu-stat-val" id="gpu-fan">—</span>
        </div>

        <div class="gpu-stat-row">
          <span class="gpu-stat-label">COMPUTE</span>
          <span class="gpu-stat-val" id="gpu-compute">—</span>
        </div>

        <div class="gpu-stat-row">
          <span class="gpu-stat-label">POWER</span>
          <span class="gpu-stat-val" id="gpu-power">—</span>
        </div>

        <!-- D3D engine breakdown for AMD -->
        <div id="gpu-d3d-engines" style="display:flex;flex-direction:column;gap:3px;border-top:1px solid var(--border);padding-top:6px;margin-top:2px"></div>

      </div>
    </div>

    <!-- Alerts (spans both rows) -->
    <div class="card" id="alerts-card">
      <span class="card-label">Health Alerts</span>
      <div class="alert-list" id="alert-list">
        <div class="no-alerts">All systems nominal</div>
      </div>
      <div style="margin-top:auto;display:flex;flex-direction:column;gap:6px">
        <div style="display:flex;gap:6px">
          <button onclick="bridge('taskmgr')" class="ctrl-btn">Task Manager</button>
          <button onclick="bridge('resmon')"  class="ctrl-btn">Res Monitor</button>
        </div>
        <div style="display:flex;gap:6px">
          <button onclick="exportSnapshot()" class="ctrl-btn" style="color:var(--green)">Export Snapshot</button>
          <button onclick="toggleStartup()"  class="ctrl-btn" id="startup-btn">Startup: ...</button>
        </div>
        <button onclick="showSensorDump()" class="ctrl-btn" style="color:var(--amber);font-size:10px">GPU Debug</button>
      </div>
    </div>

    <!-- Bottom row: cores + net + disk -->
    <div class="card" id="proc-card" style="gap:8px">
      <div style="display:flex;gap:24px;flex:1;overflow:hidden">

        <div style="min-width:120px">
          <span class="card-label">CPU Cores</span>
          <div id="cpu-heatmap" style="margin-top:8px"></div>
        </div>

        <div style="flex:1;overflow:hidden">
          <span class="card-label">Network</span>
          <div style="font-size:9px;color:var(--muted);margin:4px 0">▲ <span id="net-up">0</span> Mbps &nbsp; ▼ <span id="net-down">0</span> Mbps</div>
          <canvas id="net-canvas" height="60" style="width:100%"></canvas>
          <div class="card-sub" id="net-adapter" style="margin-top:4px">—</div>
        </div>

        <div style="min-width:160px">
          <span class="card-label">Disk I/O & Space</span>
          <div style="font-size:11px;color:var(--muted);margin-top:6px">
            R: <span id="disk-read">0</span> MB/s &nbsp; W: <span id="disk-write">0</span> MB/s
          </div>
          <div id="disk-bars" style="display:flex;flex-direction:column;gap:8px;margin-top:10px"></div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
const HIST = 60;
const cpuHist = Array(HIST).fill(0);
const ramHist = Array(HIST).fill(0);
const netUp   = Array(80).fill(0);
const netDown = Array(80).fill(0);

const netCanvas = document.getElementById('net-canvas');
const netCtx    = netCanvas.getContext('2d');

function pctColor(v) {
  if (v > 85) return '#e05454';
  if (v > 65) return '#f2b04a';
  return '#6fcf6f';
}
function tempColor(v) {
  if (v > 90) return '#e05454';
  if (v > 75) return '#f2b04a';
  return '#6fcf6f';
}
function coreColor(v) {
  const r = v > 80 ? 224 : v > 50 ? 200 : 60;
  const g = v > 80 ? 84  : v > 50 ? 150 : 207;
  return `rgb(${r},${g},80)`;
}

function setRing(id, pct, color) {
  const el = document.getElementById(id);
  el.style.strokeDashoffset = 238.76 - (pct / 100) * 238.76;
  el.style.stroke = color || pctColor(pct);
}

function renderSparkline(svgId, data, color) {
  const svg = document.getElementById(svgId);
  const W = 200, H = 28, max = Math.max(...data, 1);
  const pts = data.map((v,i) => `${(i/(data.length-1)*W).toFixed(1)},${(H-(v/max*H)).toFixed(1)}`).join(' ');
  svg.innerHTML = `<polyline class="spark-path" points="${pts}" stroke="${color}" opacity=".6"/>`;
}

function drawNetChart() {
  const W = netCanvas.offsetWidth || 300, H = netCanvas.offsetHeight || 60;
  netCanvas.width = W; netCanvas.height = H;
  const max = Math.max(...netUp, ...netDown, 0.1);
  const n = netUp.length;
  function line(data, color) {
    netCtx.beginPath();
    data.forEach((v,i) => {
      const x = (i/(n-1))*W, y = H - (v/max)*H*0.9 - 4;
      i===0 ? netCtx.moveTo(x,y) : netCtx.lineTo(x,y);
    });
    netCtx.strokeStyle = color; netCtx.lineWidth = 1.5; netCtx.stroke();
  }
  netCtx.clearRect(0,0,W,H);
  line(netDown,'#6fcf6f'); line(netUp,'#f2b04a');
}

// ── Main snapshot handler ─────────────────────────────────────────
window.cornWatch = {
  onSnapshot(snap) {

    // Header
    document.getElementById('cpu-name').textContent  = snap.cpuName || '—';
    document.getElementById('timestamp').textContent = new Date(snap.timestamp).toLocaleTimeString();
    const hv = document.getElementById('health-val');
    hv.textContent = `${snap.healthScore}/100`;
    hv.style.color = pctColor(100 - snap.healthScore);

    // CPU
    const cpuPct = Math.round(snap.cpuTotalUsage);
    document.getElementById('cpu-pct').textContent = cpuPct + '%';
    document.getElementById('cpu-pct').style.color = pctColor(cpuPct);
    setRing('cpu-ring', cpuPct);
    cpuHist.push(cpuPct); cpuHist.shift();
    renderSparkline('cpu-spark', cpuHist, pctColor(cpuPct));
    if (snap.cpuTemperature > 0)
      document.getElementById('cpu-temp').textContent = `Temp: ${snap.cpuTemperature.toFixed(0)}°C`;

    // RAM
    const ramPct = Math.round(snap.ramUsagePercent);
    document.getElementById('ram-pct').textContent = ramPct + '%';
    document.getElementById('ram-pct').style.color = pctColor(ramPct);
    setRing('ram-ring', ramPct);
    ramHist.push(ramPct); ramHist.shift();
    renderSparkline('ram-spark', ramHist, pctColor(ramPct));
    document.getElementById('ram-gb').textContent =
      `${(snap.ramUsedBytes/1073741824).toFixed(1)} / ${(snap.ramTotalBytes/1073741824).toFixed(1)} GB`;

    // GPU
    const gpu = snap.gpus?.[0];
    if (gpu) {
      document.getElementById('gpu-name').textContent    = gpu.name || 'Unknown GPU';
      const gpuPct = Math.round(gpu.usagePercent);
      document.getElementById('gpu-pct').textContent     = gpuPct + '%';
      document.getElementById('gpu-pct').style.color     = '#5ab4e8';
      setRing('gpu-ring', gpuPct, '#5ab4e8');

      const tc = tempColor(gpu.temperatureCelsius);
      document.getElementById('gpu-temp').textContent    = gpu.temperatureCelsius > 0 ? `${gpu.temperatureCelsius.toFixed(0)}°C` : '—';
      document.getElementById('gpu-temp').style.color    = tc;

      const vramPct = Math.round(gpu.vramUsagePercent);
      document.getElementById('gpu-vram').textContent    = gpu.vramTotalMb > 0
        ? `${(gpu.vramUsedMb/1024).toFixed(1)} / ${(gpu.vramTotalMb/1024).toFixed(1)} GB`
        : '—';
      document.getElementById('gpu-vram-bar').style.width      = vramPct + '%';
      document.getElementById('gpu-vram-bar').style.background = pctColor(vramPct);

      document.getElementById('gpu-fan').textContent    = gpu.fanRpm > 0 ? `${Math.round(gpu.fanRpm)} RPM` : '—';
      document.getElementById('gpu-compute').textContent = gpu.computeUsagePercent > 0 ? `${gpu.computeUsagePercent.toFixed(1)}%` : '—';
      document.getElementById('gpu-power').textContent  = gpu.powerWatts > 0 ? `${gpu.powerWatts.toFixed(0)} W` : '—';

      // D3D engine breakdown (AMD-specific)
      const engines = gpu.d3DEngines || {};
      const engineKeys = Object.keys(engines).filter(k => engines[k] > 0);
      const d3dEl = document.getElementById('gpu-d3d-engines');
      if (d3dEl) {
        if (engineKeys.length > 0) {
          d3dEl.innerHTML = engineKeys.map(k =>
            `<div class="gpu-stat-row">
              <span class="gpu-stat-label" style="font-size:9px">${k.replace('D3D ','')}</span>
              <span class="gpu-stat-val" style="font-size:11px;color:var(--blue)">${engines[k].toFixed(1)}%</span>
            </div>`
          ).join('');
        } else {
          d3dEl.innerHTML = '';
        }
      }
    } else {
      document.getElementById('gpu-name').textContent = 'No GPU detected';
    }

    // Net
    document.getElementById('net-up').textContent    = snap.networkSentMbps.toFixed(2);
    document.getElementById('net-down').textContent  = snap.networkReceivedMbps.toFixed(2);
    document.getElementById('net-adapter').textContent = snap.activeAdapterName || '—';
    netUp.push(snap.networkSentMbps);       netUp.shift();
    netDown.push(snap.networkReceivedMbps); netDown.shift();
    drawNetChart();

    // Disk I/O
    document.getElementById('disk-read').textContent  = snap.diskReadMbps.toFixed(1);
    document.getElementById('disk-write').textContent = snap.diskWriteMbps.toFixed(1);

    // Disk bars
    const diskContainer = document.getElementById('disk-bars');
    diskContainer.innerHTML = '';
    (snap.disks || []).forEach(d => {
      const pct = Math.round(d.usagePercent);
      const freeGb = (d.freeBytes / 1073741824).toFixed(0);
      diskContainer.innerHTML += `
        <div class="disk-row">
          <div class="disk-header">
            <span>${d.driveLetter} ${d.label || ''}</span>
            <span style="color:${pctColor(pct)}">${pct}%</span>
          </div>
          <div class="disk-bar-wrap">
            <div class="disk-bar" style="width:${pct}%;background:${pctColor(pct)}"></div>
          </div>
          <div style="font-size:9px;color:#555">${freeGb} GB free</div>
        </div>`;
    });

    // CPU core heatmap
    const heatmap = document.getElementById('cpu-heatmap');
    const cores = snap.cpuCoreUsages || [];
    if (heatmap.children.length !== cores.length) {
      heatmap.innerHTML = cores.map((_,i) => `<div class="core-cell" id="core-${i}">${i}</div>`).join('');
    }
    cores.forEach((v,i) => {
      const cell = document.getElementById(`core-${i}`);
      if (cell) cell.style.background = coreColor(v);
    });

    // Processes
    updateProcessTable(snap.processes);

    // Alerts
    const list = document.getElementById('alert-list');
    const alerts = snap.alerts || [];
    list.innerHTML = alerts.length === 0
      ? '<div class="no-alerts">All systems nominal ✓</div>'
      : alerts.map(a => `
          <div class="alert-item ${a.severity.toLowerCase()}">
            <div class="alert-cat">${a.category}</div>
            ${a.message}
          </div>`).join('');
  }
};

async function exportSnapshot() {
  try {
    const path = await window.chrome.webview.hostObjects.cornBridge.ExportSnapshot();
    alert('Saved to:\n' + path);
  } catch(e) { alert('Export unavailable: ' + e); }
}

async function toggleStartup() {
  try {
    const b = window.chrome.webview.hostObjects.cornBridge;
    const current = await b.GetStartupEnabled();
    await b.SetStartupEnabled(!current);
    updateStartupBtn(!current);
  } catch(e) { alert('Startup toggle unavailable: ' + e); }
}

function updateStartupBtn(enabled) {
  const btn = document.getElementById('startup-btn');
  if (btn) {
    btn.textContent = 'Startup: ' + (enabled ? 'ON' : 'OFF');
    btn.style.color = enabled ? 'var(--green)' : 'var(--muted)';
  }
}

async function initStartupBtn() {
  try {
    const enabled = await window.chrome.webview.hostObjects.cornBridge.GetStartupEnabled();
    updateStartupBtn(enabled);
  } catch(e) {}
}

function updateProcessTable(procs) {
  const tbody = document.getElementById('proc-tbody');
  if (!tbody || !procs?.length) return;
  tbody.innerHTML = procs.map(p => {
    const mb = (p.ramBytes / 1048576).toFixed(0);
    return `<tr>
      <td style="max-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</td>
      <td style="color:var(--muted)">${p.pid}</td>
      <td style="color:var(--amber)">${mb} MB</td>
    </tr>`;
  }).join('');
}

async function showSensorDump() {
  try {
    const dump = await window.chrome.webview.hostObjects.cornBridge.GetGpuSensorDump();
    const w = window.open('', '_blank', 'width=700,height=500');
    w.document.write('<pre style="background:#0a0a0a;color:#6fcf6f;font-family:monospace;font-size:12px;padding:16px;white-space:pre-wrap">' + (dump || 'No sensor data yet — wait a second and try again.') + '</pre>');
  } catch(e) { alert('Bridge unavailable: ' + e); }
}

function bridge(action) {
  try {
    if (action === 'taskmgr') window.chrome.webview.hostObjects.cornBridge.OpenProcessManager();
    if (action === 'resmon')  window.chrome.webview.hostObjects.cornBridge.OpenResourceMonitor();
  } catch(e) { console.warn('bridge unavailable', e); }
}

window.addEventListener('resize', drawNetChart);
drawNetChart();
initStartupBtn();
</script>
</body>
</html>
